; vex-iotbox PlatformIO 配置
; 用法：
;   pio run -e unit_light_ctrl          编译单个单元
;   pio run -e unit_light_ctrl -t upload --upload-port COM8  编译并烧录
;   pio run                             编译所有单元

[platformio]
src_dir = .

; ── 公共配置（所有环境继承）──
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_flags =
    -std=gnu++17
    -fexceptions
    -I main
    -D WIFI_SSID=\"NYF_72\"
    -D WIFI_PASS=\"woaiwojia@2019\"
    -D MQTT_HOST=\"iot.vexrune.top\"
    -D MQTT_PORT=443
    -D MQTT_USER=\"vex_admin\"
    -D MQTT_PASS=\"vex_admin_SDFI3FOUID8\"

; ── S3 公共配置（16MB Flash + PSRAM）──
[common_s3]
extends = common
board_build.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

; ═══════════════════════════════════════════════
; 产品固件（每个单元一块板子）
; ═══════════════════════════════════════════════

[env:unit_main_ctrl]
extends = common_s3
monitor_port = COM8
build_src_filter = +<main/unit_main_ctrl/**> +<main/common/**>
build_flags =
    ${common_s3.build_flags}
    -D UNIT_ID=\"0001\"
lib_deps =
    ${common.lib_deps}
    olikraus/U8g2@^2.35
    adafruit/DHT sensor library@^1.4
    esphome/ESP32-audioI2S
    WiFi

[env:unit_light_ctrl]
extends = common
board = esp32dev
monitor_port = COM8
build_src_filter = +<main/unit_light_ctrl/**> +<main/common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0101\"
lib_deps =
    ${common.lib_deps}
    WiFi

[env:unit_door_access]
extends = common
monitor_port = COM8
build_src_filter = +<main/unit_door_access/**> +<test/common/**>
build_flags =
    ${common.build_flags}
    -I test
    -D UNIT_ID=\"0201\"

[env:unit_power_meter]
extends = common
monitor_port = COM8
build_src_filter = +<main/unit_power_meter/**> +<test/common/**>
build_flags =
    ${common.build_flags}
    -I test
    -D UNIT_ID=\"0301\"

