; vex-iotbox PlatformIO 配置
; 用法：
;   pio run -e light_ctrl          编译单个单元
;   pio run -e light_ctrl -t upload --upload-port COM8  编译并烧录
;   pio run                         编译所有单元

[platformio]
src_dir = .

; ── 公共配置（所有环境继承）──
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_flags =
    -std=gnu++17
    -fexceptions
    -I common
    -D WIFI_SSID=\"fomalhaut-luke\"
    -D WIFI_PASS=\"fomalhaut-luke2019\"
    -D MQTT_HOST=\"192.168.31.190\"
    -D MQTT_PORT=11883
    -D MQTT_USER=\"mqtt_user\"
    -D MQTT_PASS=\"mqtt_password\"

; ═══════════════════════════════════════════════
; 产品固件（每个单元一块板子）
; ═══════════════════════════════════════════════

[env:main_ctrl]
extends = common
monitor_port = COM8
build_src_filter = +<main_ctrl/**> +<common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0001\"

[env:light_ctrl]
extends = common
monitor_port = COM8
build_src_filter = +<light_ctrl/**> +<common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0101\"

[env:door_access]
extends = common
monitor_port = COM8
build_src_filter = +<door_access/**> +<common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0201\"

[env:power_meter]
extends = common
monitor_port = COM8
build_src_filter = +<power_meter/**> +<common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0301\"

; ═══════════════════════════════════════════════
; 测试固件
; ═══════════════════════════════════════════════

[env:hw_test]
extends = common
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
monitor_port = COM8
build_src_filter = +<hw_test/**> +<common/**>
build_flags =
    ${common.build_flags}
lib_deps =
    ${common.lib_deps}
    olikraus/U8g2@^2.35
    adafruit/DHT sensor library@^1.4
    adafruit/Adafruit NeoPixel@^1.12
    WiFi
