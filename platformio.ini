; vex-iotbox PlatformIO 配置
; 用法：
;   pio run -e light_ctrl          编译单个单元
;   pio run -e light_ctrl -t upload --upload-port COM8  编译并烧录
;   pio run                         编译所有单元

[platformio]
src_dir = .

; ── 公共配置（所有环境继承）──
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_flags =
    -std=gnu++17
    -fexceptions
    -I main
    -D WIFI_SSID=\"fomalhaut-luke\"
    -D WIFI_PASS=\"fomalhaut-luke2019\"
    -D MQTT_HOST=\"192.168.31.190\"
    -D MQTT_PORT=11883
    -D MQTT_USER=\"mqtt_user\"
    -D MQTT_PASS=\"mqtt_password\"

; ── S3 公共配置（16MB Flash + PSRAM）──
[common_s3]
extends = common
board_build.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

; ═══════════════════════════════════════════════
; 产品固件（每个单元一块板子）
; ═══════════════════════════════════════════════

[env:main_ctrl]
extends = common
monitor_port = COM8
build_src_filter = +<main/main_ctrl/**> +<main/common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0001\"

[env:light_ctrl]
extends = common
monitor_port = COM8
build_src_filter = +<main/light_ctrl/**> +<main/common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0101\"

[env:door_access]
extends = common
monitor_port = COM8
build_src_filter = +<main/door_access/**> +<main/common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0201\"

[env:power_meter]
extends = common
monitor_port = COM8
build_src_filter = +<main/power_meter/**> +<main/common/**>
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0301\"

; ═══════════════════════════════════════════════
; 测试固件
; ═══════════════════════════════════════════════

[env:hw_test]
extends = common_s3
monitor_port = COM8
build_src_filter = +<test/hw_test/**> +<main/common/**>
lib_deps =
    ${common.lib_deps}
    olikraus/U8g2@^2.35
    adafruit/DHT sensor library@^1.4
    adafruit/Adafruit NeoPixel@^1.12
    WiFi
    esphome/ESP32-audioI2S

[env:audio_test]
extends = common_s3
monitor_port = COM8
build_src_filter = +<test/audio_test/**> +<main/common/**>
build_flags =
    ${common_s3.build_flags}
    -D UNIT_ID=\"0501\"
lib_deps =
    ${common.lib_deps}
    WiFi

[env:tts_test]
extends = common_s3
monitor_port = COM8
build_src_filter = +<test/tts_test/**> +<main/common/**>
build_flags =
    ${common_s3.build_flags}
    -D UNIT_ID=\"0601\"
    -DMINIMAX_API_KEY=\"sk-cp-0cx8-H-KKo14uqdNurVEZFw_U2KRjadkIGl3c41wfSVge75_ZE-v9GJHhtRyxZD96_l2461T8bK8KjGSRWwUj21Uhs_M1waHOZCuTViL3Vlvn10jh4iFPL0\"
lib_deps =
    ${common.lib_deps}
    WiFi
    esphome/ESP32-audioI2S

[env:smart_speaker_test]
extends = common_s3
monitor_port = COM8
build_src_filter = +<test/smart_speaker_test/**> +<main/common/**>
build_flags =
    ${common_s3.build_flags}
    -D UNIT_ID=\"0701\"
    -DMIMO_API_KEY=\"tp-cjikbp7tf1dcfclip651lquzxkfokzie4nuqwp3nov7rlxvw\"
lib_deps =
    ${common.lib_deps}
    WiFi
    esphome/ESP32-audioI2S

[env:c3_test]
extends = common
board = esp32-c3-devkitc-02
board_build.arduino.usb_mode = CDC
monitor_port = COM10
build_src_filter = +<test/c3_test/**> +<main/common/**>
board_build.flash_mode = dio
build_flags =
    ${common.build_flags}
    -D UNIT_ID=\"0401\"
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${common.lib_deps}
    WiFi
